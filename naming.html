<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>골프라이프 — P 문법의 G 4안</title>
<style>
  * { margin:0; box-sizing:border-box; }
  body { background:linear-gradient(160deg,#2c3844,#1f2933); color:#eef2f6;
         font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; padding:24px 16px 60px; }
  h1 { font-size:19px; text-align:center; margin-bottom:4px; }
  .sub { text-align:center; color:#9fb0c0; font-size:12.5px; margin-bottom:18px; }
  .phone { max-width:560px; margin:0 auto 26px; background:linear-gradient(180deg,#0f172a,#1e293b);
           border-radius:22px; padding:20px 14px 14px; box-shadow:0 10px 30px rgba(0,0,0,.4); }
  .phone .cap { text-align:center; color:#94a3b8; font-size:11px; margin-bottom:12px; }
  .pgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px 8px; }
  .pcell { text-align:center; }
  .pcell svg { width:52px; height:52px; border-radius:12px; display:block; margin:0 auto 4px; }
  .pcell .lb { font-size:9.5px; color:#e2e8f0; }
  .pcell .no { font-size:9px; color:#34d399; font-weight:800; }
  .cand { background:#38465a; border-radius:16px; padding:18px 16px; max-width:560px; margin:0 auto 18px; position:relative; }
  .num { position:absolute; top:-8px; left:-6px; background:#34d399; color:#0d2b1e; width:26px; height:26px;
         border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; }
  .toprow { display:flex; gap:14px; align-items:center; margin-bottom:10px; }
  .toprow svg.main { width:96px; height:96px; border-radius:23px; box-shadow:0 6px 16px rgba(0,0,0,.35); flex:0 0 96px; }
  .minis { display:flex; flex-direction:column; gap:6px; }
  .minis svg { border-radius:22%; display:block; }
  .s44 { width:44px; height:44px; } .s26 { width:26px; height:26px; }
  .tinfo h2 { font-size:16px; margin-bottom:3px; }
  .tinfo p { font-size:12px; color:#9fb0c0; line-height:1.6; }
  .tinfo b { color:#eef2f6; }
  .locks { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .lock { border-radius:12px; padding:14px 12px; display:flex; align-items:center; gap:10px; }
  .lock.white { background:#ffffff; }
  .lock.dark { background:#111827; }
  .lock svg { width:40px; height:40px; flex:0 0 40px; border-radius:10px; }
  .lock .wm { line-height:1.15; }
  .lock .t1 { font-size:17px; font-weight:800; letter-spacing:.5px; }
  .lock.white .t1 { color:#1f2937; } .lock.dark .t1 { color:#f8fafc; }
  .lock .t1 .life { color:#16a34a; }
  .lock .t2 { font-size:8.5px; margin-top:2px; }
  .lock.white .t2 { color:#9ca3af; } .lock.dark .t2 { color:#64748b; }
</style>
</head>
<body>
<h1>🚩 P의 문법으로 만든 G — 4안</h1>
<p class="sub">흰 깃대가 글자를 관통하고, 깃발이 글자 속을 파냄 · 주황 공이 마침표</p>

<div class="phone">
  <div class="cap">📱 폰 홈 화면 미리보기</div>
  <div class="pgrid" id="pgrid"></div>
</div>

<div id="cards"></div>

<div id="defs" style="display:none">

<!-- 1 네거티브 깃발 G -->
<svg data-name="네거티브 깃발 G" data-desc="정자 G에 <b>흰 깃대가 슬릿처럼 관통</b>하고, 깃발 물결이 G의 어깨를 파냄 — P 로고 문법의 정직한 G 번역. 주황 공이 'G.'의 마침표." viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#fafafa"/>
  <path d="M64 21 A29 29 0 1 0 76 49 H56" stroke="#6ab557" stroke-width="19" fill="none" stroke-linecap="round"/>
  <rect x="44.5" y="12" width="5.5" height="50" rx="2.7" fill="#fafafa"/>
  <path d="M50 14 Q62 21 71 15 Q67 28 50 33 Z" fill="#fafafa"/>
  <circle cx="79" cy="81" r="8.5" fill="#e8913a"/>
</svg>

<!-- 2 플래그 바 G -->
<svg data-name="플래그 바 G" data-desc="G의 <b>가로 바 자체가 안쪽을 향한 깃발</b> — 홀을 가리키는 화살처럼. 흰 깃대 슬릿과 만나 '꽂힌 깃발'이 완성됨." viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#fafafa"/>
  <path d="M64 21 A29 29 0 1 0 76 49" stroke="#6ab557" stroke-width="19" fill="none" stroke-linecap="round"/>
  <path d="M83 38 L55 50 L83 62 Z" fill="#6ab557"/>
  <rect x="51" y="16" width="5.5" height="46" rx="2.7" fill="#fafafa"/>
  <circle cx="80" cy="82" r="8.5" fill="#e8913a"/>
</svg>

<!-- 3 스파이럴 네거티브 -->
<svg data-name="스파이럴 네거티브" data-desc="어제 방향(홀로 감기는 나선 G)에 P 문법을 결합 — <b>흰 깃대가 나선을 관통</b>해 홀 중심에 꽂히고, 주황 깃발이 시선을 잡음." viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#fafafa"/>
  <path d="M66 28 A29 29 0 1 0 80 54 A19 19 0 1 0 64 49 A8.5 8.5 0 1 0 52 53"
        stroke="#6ab557" stroke-width="11" fill="none" stroke-linecap="round"/>
  <rect x="49.5" y="12" width="5" height="44" rx="2.4" fill="#fafafa"/>
  <ellipse cx="52" cy="57" rx="5" ry="2.2" fill="#1f2937"/>
  <path d="M55 13 L77 21 L55 29 Z" fill="#e8913a"/>
</svg>

<!-- 4 오가닉 G. -->
<svg data-name="오가닉 G." data-desc="P 레퍼런스의 <b>부드럽고 두툼한 살집</b> 그대로 — 바 없이 열린 G, 깃발 물결만으로 골프를 말하고, 주황 공 마침표로 끝." viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#fafafa"/>
  <path d="M66 19 A31 31 0 1 0 81 51" stroke="#6bb45a" stroke-width="23" fill="none" stroke-linecap="round"/>
  <rect x="43.5" y="10" width="6" height="52" rx="3" fill="#fafafa"/>
  <path d="M49.5 12 Q63 19 73 12 Q69 27 49.5 32 Z" fill="#fafafa"/>
  <circle cx="80" cy="82" r="9.5" fill="#e8913a"/>
</svg>

</div>

<script>
  const defs = [...document.querySelectorAll('#defs > svg')];
  const pg = document.getElementById('pgrid');
  const cards = document.getElementById('cards');
  defs.forEach((svg, i) => {
    const cell = document.createElement('div');
    cell.className = 'pcell';
    cell.appendChild(svg.cloneNode(true));
    cell.insertAdjacentHTML('beforeend', `<div class="lb">골프라이프</div><div class="no">${i + 1}번</div>`);
    pg.appendChild(cell);

    const card = document.createElement('div');
    card.className = 'cand';
    card.innerHTML = `<span class="num">${i + 1}</span>`;
    const top = document.createElement('div');
    top.className = 'toprow';
    const main = svg.cloneNode(true); main.classList.add('main');
    top.appendChild(main);
    const minis = document.createElement('div');
    minis.className = 'minis';
    const m1 = svg.cloneNode(true); m1.classList.add('s44');
    const m2 = svg.cloneNode(true); m2.classList.add('s26');
    minis.appendChild(m1); minis.appendChild(m2);
    top.appendChild(minis);
    const info = document.createElement('div');
    info.className = 'tinfo';
    info.innerHTML = `<h2>${svg.dataset.name}</h2><p>${svg.dataset.desc}</p>`;
    top.appendChild(info);
    card.appendChild(top);

    const locks = document.createElement('div');
    locks.className = 'locks';
    for (const mode of ['white', 'dark']) {
      const lk = document.createElement('div');
      lk.className = 'lock ' + mode;
      lk.appendChild(svg.cloneNode(true));
      lk.insertAdjacentHTML('beforeend',
        `<div class="wm"><div class="t1">골프<span class="life">라이프</span></div>
         <div class="t2">나의 골프 라이프를 담다</div></div>`);
      locks.appendChild(lk);
    }
    card.appendChild(locks);
    cards.appendChild(card);
  });
</script>
</body>
</html>

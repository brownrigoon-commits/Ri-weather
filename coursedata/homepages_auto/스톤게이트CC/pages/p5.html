				<h1>HOLE 1<span>Par 3</span></h1>
				<h2>길지 않은 파3홀로 그린 좌측과 뒤쪽이 OB지역이므로 정확한 공략이 중요한 홀</h2>
				<p>
					그린 좌측에 핀이 있을 때는 그린 좌측에 받아주는 벙커와 공간이 거의 없고 카트도로가 인접해 있으므로
					우증간으로 안전한 공략이 유리할 수 있는 홀이며, 그린은 경사가 비교적 크므로 핀 위치에 따라 퍼팅이 까다로운 홀이다.
				</p>

<script>

    function regAgree() {
        var rData = getJsonForm("/Member/RegAgree");
        if (rData.code > 0) {
            location.href = "/Ko/";
        }
    }

    function hidePopup() {
        const popup = document.getElementById('myPopup');
        popup.style.display = 'none';
    }

    function LoginAction() {

        var oId = $("#txtId");
        var oPwd = $("#txtPwd");
        var isLoginAuto = "N"; //자동로그인


        if ($("#txtId").val() == "") {
            alert("아이디(회원번호)를 입력해 주세요.");
            $("#txtId").focus();
            return false;
        }

        if ($("#txtPwd").val() == "") {
            alert("비밀번호를 입력해 주세요.");
            $("#txtPwd").focus();
            return false;
        }
        
        oId = encryptData(oId.val(), $("#secretKey").val());
        oPwd = encryptData(oPwd.val(), $("#secretKey").val());

        if (!oId) {
            alert("아이디를 입력해 주세요.");
            oId.focus();
            return false;
        }

        if (!oPwd) {
            alert("비밀번호를 입력해 주세요.");
            oPwd.focus();
            return false;
        }

        //자동로그인 체크여부
        if ($("#chkAutoLogin").is(":checked")) {
            //SetCookie("chkAutoLogin", "Y", 1);
            isLoginAuto = "Y";
        }

        var rData = getJsonForm("/Member/LoginAction", { memberId: oId, memberPw: oPwd, save_id: isLoginAuto });
        alert(rData.msg.replace("<br />", "\n"));
        if (rData.code == "0") {
            location.href = "/Ko/";
        } else if (rData.code == "N") {
            showPopup();
        }
    }

    function showPopup() {
        const popup = document.getElementById('myPopup');
        popup.style.display = 'flex';
    }

    function encryptData(data, secretKey) {
        const key = CryptoJS.enc.Utf8.parse(secretKey);
        const iv = CryptoJS.lib.WordArray.random(16); // 128비트 IV 생성 (CBC 모드 권장)

        const encrypted = CryptoJS.AES.encrypt(CryptoJS.enc.Utf8.parse(data), key, {
            iv: iv,
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
        });

        // IV와 암호화된 데이터를 Base64로 인코딩하여 함께 반환
        const encryptedBase64 = CryptoJS.enc.Base64.stringify(iv.concat(encrypted.ciphertext));

        return encryptedBase64;
    }


</script>

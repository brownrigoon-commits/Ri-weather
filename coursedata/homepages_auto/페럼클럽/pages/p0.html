	var expire = new Date();

   if( calScrollTop <= varScrollTop ){

});
$(window).on('resize', function(){
    if( documentHeight - windowHeight < 100 ){
        $('.foot-content').removeClass('fixed');
        fixed = false;
    } else if (documentHeight - windowHeight > 100 ) {
        $('.foot-content').addClass('fixed');
        fixed = true;
    }
});

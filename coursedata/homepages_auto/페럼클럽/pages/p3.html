<script type="text/javascript">
$(document).ready(function() {
	$('.t_course table td').not('.first').bind('mouseenter', function() {
		$('.t_course table td').not('.first').each(function() {
			$(this).find('img').attr('src', $(this).find('img').attr('src').replace('_on', ''));
		});
		$(this).find('img').attr('src', $(this).find('img').attr('src').replace('.png', '_on.png'));
	}).bind('mouseleave', function() {
		$('.t_course table td').not('.first').each(function() {
			$(this).find('img').attr('src', $(this).find('img').attr('src').replace('_on', ''));
		});
	});
});

function select_course(idx, depth) {
	$('.first > img').attr('src', '/images/course/big_hole'+idx+'.png');
	var x = 10;
	$('.t_course table td').not('.first').each(function(i) {
		if (idx == x) x++;
		var on = (depth == (i + 1)) ? '_on' : '';
		$(this).find('a').attr('href', 'javascript:select_course(' + x + ', ' + (i + 1) + ');');
		$(this).find('img').attr('src', '/images/course/b_hole'+ x + on + '.png');
		x++;
	});

	$('.hole_view img').hide();
	$('.img_' + idx).show();
}
</script>

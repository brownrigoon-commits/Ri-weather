<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>서원밸리, 서원힐스, 대보그룹</title>
    <meta content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no"
          name="viewport"/>
    <link rel="stylesheet" href="/pc/css/index.css" type="text/css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!--    Pretendard webFont-->
    <link rel="stylesheet" type="text/css"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"/>
    <script src="/js/jquery.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.0.2/TweenMax.min.js"></script>
</head>
<body>
<script>
    //vh
    $(window).on('load resize', function () {
        //아이폰 하단 배젤 resize
        const mvh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${mvh}px`);

        window.addEventListener('resize', () => {
            const mvh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${mvh}px`);
        });
    });

    //AOS
    $(document).ready(function () {
        if ($('#wrap #introWrap').length) {
            AOS.init({
                duration: 1800,
            });
        } else {
            AOS.init({
                duration: 1800,
                disable: function () {
                    var maxWidth = 1280;
                    return window.innerWidth < maxWidth;
                },
            });
        }
    });

    //txt-tween
    $(document).ready(function () {
        var idx = 0;

        function init() {
            txt1 = $('.introTextWrap').find('.txt01');
            txt2 = $('.introTextWrap').find('.txt02');

            setTween();
        }

        function setTween() {
            TweenMax.fromTo(txt1, 1.5, {'display': 'none', opacity: 0, y: 55}, {
                delay: 1.2,
                'display': 'block',
                opacity: 1,
                y: 0,
                ease: Power4.easeInOut
            });
            TweenMax.fromTo(txt2, 1.5, {'display': 'none', opacity: 0, y: 40}, {
                delay: 2.0,
                'display': 'block',
                opacity: 1,
                y: 0,
                ease: Power4.easeInOut
            });
        }

        function reset() {
            TweenMax.killTweensOf(txt1);
            TweenMax.killTweensOf(txt2);

            idx = 0;
        }

        return {
            init: init(),
            reset: reset
        }
    });
</script>
<div id="wrap">
    <div id="introWrap" data-aos="">
        <div class="introText">
            <div class="introTextWrap">
                <h3 class="txt01"><span>Welcome to SEOWON</span>고향의 ‘情’ 과 토너먼트의 ‘가치’ 가 담겨있는</h3>
                <h4 class="txt02">모두가 꿈꾸는 코스를 만들어갑니다.</h4>
            </div>
        </div>
        <video src="https://kr.object.ncloudstorage.com/contents/seowon-mp4/pc_intro.mp4" loop="" muted="" autoplay="" playsinline=""></video>
        <ul class="introBg" style="display:none;">
            <li>
                <p>고향에 온 것 같은 편안함
                    <span>SEOWON VALLEY</span></p>
            </li>
            <li>
                <p>LPGA가 선택한 최고의 코스
                    <span>SEOWON HILLS</span></p>
            </li>
        </ul>
        <div class="introContents I-container">
            <div class="introLogo"><img src="/pc/images/main-logo.svg" alt="인트로메인로고"></div>
            <div class="introBanner I-container">
                <div class="pc">
                    <ul class="flex banner-list">
                        <li class="introBanner-list">
                            <a href="/valley/main">SEOWON VALLEY<span>회원제</span></a>
                        </li>
                        <li class="introBanner-list">
                            <a href="/hills/main">SEOWON HILLS<span>비회원제</span>
                            </a>
                        </li>
                    </ul>
                </div>
                <div class="mob">
                    <ul class="flex banner-list">
                        <li class="introBanner-list"><a href="/valley/main">SEOWON VALLEY<span>회원제</span></a></li>
                        <li class="introBanner-list"><a href="/hills/main">SEOWON HILLS<span>비회원제</span></a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    $(function () {
        var pc = matchMedia("screen and (min-width:1281px)");
        if (pc.matches) {
            $('div#introWrap .introBanner .banner-list > li').on({
                mouseenter: function () {
                    $('div#introWrap .introBg').stop().fadeIn(300);
                    $('div#introWrap .introBg > li').eq($(this).index()).show().siblings().hide();
                    $('div#introWrap .introText .introTextWrap').stop().animate({opacity: "0"}, 100);
                    $('div#introWrap .introLogo').stop().animate({opacity: "0"}, 100);
                }, mouseleave: function () {
                    $('div#introWrap .introBg').stop().fadeOut(300);
                    $('div#introWrap .introText .introTextWrap').stop().animate({opacity: "1"}, 800).fadeIn(300);
                    $('div#introWrap .introLogo').stop().animate({opacity: "1"}, 800).fadeIn(300);
                }
            });
        } else {
        }
    });
</script>

</body>
</html>

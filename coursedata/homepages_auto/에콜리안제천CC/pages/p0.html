    	function gotoURL( str, goUrl ) {
    		try {
        		if(str == "" || str.length<=0) return;
        		
        		// 로딩 블럭처리
        		showLoaingBlock();
        		
        		var url = "";
        		if (str == "main"){
        			url = "/common/main.do";
        		}else if (str == "login"){
        			url = "/join/login.do";
        		}else if (str == "logout"){
        			url = "/join/logout.do";
        		}else if (str == "join"){
        			url = "/join/joinForm.do";
        		}else if (str == "mainCoDiv"){
        			if (goUrl == undefined || goUrl == ""){
        				alert("주 이용 골프장 정보가 없습니다.\n회원정보수정에서 설정해 주세요.");
            			url = "/member/modifyForm.do";
        			}else{
            			url = "?coDiv=" + goUrl;
            			goUrl = "";
        			}
        		}else{
        			url = g_context_name + str;
        		}
        		if (goUrl != undefined && goUrl != ""){
           			url += (url.indexOf("?") > 0 ? "&" : "?") + "goUrl=" + encodeURIComponent(goUrl);
        		}
        		document.location.href = url;
        		return false;
    		} catch(e) {
    			//alert ("exception : \n"+"name:"+name+"\nerror code:" + e.number +"\nerror desc:" + e.description);
    		}finally{
        		// 로딩 블럭처리 해제
        		hiddenLoaingBlock();
    		}
    		return false;
    	}

        var width = $(window).width();

            $(".header-wrap-pc").show();
            $(".header-wrap-mobile").hide();
        }
        /*태블릿*/

        }
